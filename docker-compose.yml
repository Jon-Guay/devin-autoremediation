networks:
  autoremediation-net:
    driver: bridge

volumes:
  session-data:

services:

  issue_scanner:
    build: ./issue_scanner
    profiles: ["scan"]
    env_file: .env
    networks: [autoremediation-net]

  demo_reset:
    build: ./demo_reset
    profiles: ["reset"]
    env_file: .env
    volumes:
      - session-data:/data
    networks: [autoremediation-net]

  webhook_server:
    build: ./webhook_server
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - session-data:/data
    networks: [autoremediation-net]

  devin_exporter:
    build: ./devin_exporter
    restart: always
    env_file: .env
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - session-data:/data
    networks: [autoremediation-net]

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: http webhook_server:8000 --log stdout
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    networks: [autoremediation-net]
    depends_on:
      - webhook_server

  grafana_updater:
    image: python:3.12-slim
    command: sh -c "pip install -q httpx && python /scripts/update_grafana_webhook.py"
    volumes:
      - ./scripts:/scripts:ro
    env_file: .env
    networks: [autoremediation-net]
    restart: "no"
    depends_on:
      - ngrok

  alloy:
    image: grafana/alloy:latest
    restart: always
    env_file: .env
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run /etc/alloy/config.alloy
    networks: [autoremediation-net]
    depends_on:
      - devin_exporter
      - webhook_server
